
<!DOCTYPE html>
<html>
<head>
    <title>Timezone Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f6f8;
        }

        .converter {
            max-width: 1100px;
        }

        .top-sections {
            display: flex;
            gap: 16px;
            align-items: stretch;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .panel {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #fff;
            padding: 16px;
            box-sizing: border-box;
            min-width: 320px;
        }

        .panel h3,
        .bottom-section h3 {
            margin: 0 0 14px 0;
            font-size: 20px;
            font-weight: 600;
        }

        .panel-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tz-select-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="number"] {
            width: 56px;
            padding: 8px;
            text-align: center;
            font-size: 16px;
        }

        input[type="text"] {
            width: 220px;
            padding: 8px 10px;
            text-align: center;
            font-size: 16px;
        }

        input[type="date"] {
            padding: 8px;
            font-size: 16px;
        }

        select {
            padding: 8px;
            font-size: 16px;
        }

        .digital-display {
            font-size: 22px;
            font-weight: bold;
            background: #222;
            color: #0f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            min-width: 160px;
            text-align: center;
        }

        .divider {
            border-top: 2px solid #d0d0d0;
            margin: 8px 0 18px 0;
        }

        .bottom-section {
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #fff;
            padding: 16px;
        }

        .generic-date-row {
            margin-bottom: 12px;
        }

        .generic-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .generic-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            min-width: 300px;
        }

        .output-box {
            width: 220px;
            font-size: 22px;
            font-weight: bold;
            background: #222;
            color: #0f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            text-align: center;
            border: none;
            box-sizing: border-box;
        }

        .output-box:focus {
            outline: none;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-top: 18px;
            cursor: pointer;
        }

        .fun-line {
            width: 100%;
            margin-top: 14px;
            color: #7d8f87;
            font-size: 14px;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
    <script>
        function clearOnFocus(el) {
            el.value = '';
        }

        function to24Hour(hour, ampm) {
            hour = parseInt(hour, 10);
            if (ampm === 'PM' && hour < 12) hour += 12;
            if (ampm === 'AM' && hour === 12) hour = 0;
            return hour;
        }

        function getFormatterParts(date, timeZone) {
            const formatter = new Intl.DateTimeFormat('en-CA', {
                timeZone: timeZone,
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hourCycle: 'h23'
            });

            const parts = formatter.formatToParts(date);
            const map = {};
            parts.forEach(part => {
                if (part.type !== 'literal') {
                    map[part.type] = part.value;
                }
            });
            return map;
        }

        function zonedDateTimeToUtc(dateStr, hour, minute, ampm, timeZone) {
            const hour24 = to24Hour(hour, ampm);
            const [year, month, day] = dateStr.split('-').map(Number);

            const approxUtc = new Date(Date.UTC(year, month - 1, day, hour24, parseInt(minute, 10), 0));
            const zonedParts = getFormatterParts(approxUtc, timeZone);

            const zonedAsUtc = Date.UTC(
                parseInt(zonedParts.year, 10),
                parseInt(zonedParts.month, 10) - 1,
                parseInt(zonedParts.day, 10),
                parseInt(zonedParts.hour, 10),
                parseInt(zonedParts.minute, 10),
                parseInt(zonedParts.second, 10)
            );

            const desiredAsUtc = Date.UTC(year, month - 1, day, hour24, parseInt(minute, 10), 0);
            const offset = zonedAsUtc - desiredAsUtc;

            return new Date(approxUtc.getTime() - offset);
        }

        function formatTimeOnly(date, timeZone) {
            return new Intl.DateTimeFormat('en-US', {
                timeZone: timeZone,
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            }).format(date);
        }

        const majorTimezones = [
            { label: 'US Pacific (UTC-08:00)', zone: 'America/Los_Angeles' },
            { label: 'US Mountain (UTC-07:00)', zone: 'America/Denver' },
            { label: 'US Central (UTC-06:00)', zone: 'America/Chicago' },
            { label: 'US Eastern (UTC-05:00)', zone: 'America/New_York' },
            { label: 'Brazil (UTC-03:00)', zone: 'America/Sao_Paulo' },
            { label: 'UK (UTC+00:00)', zone: 'Europe/London' },
            { label: 'Ireland (UTC+00:00)', zone: 'Europe/Dublin' },
            { label: 'Central Europe (UTC+01:00)', zone: 'Europe/Berlin' },
            { label: 'Eastern Europe (UTC+02:00)', zone: 'Europe/Athens' },
            { label: 'South Africa (UTC+02:00)', zone: 'Africa/Johannesburg' },
            { label: 'Turkey (UTC+03:00)', zone: 'Europe/Istanbul' },
            { label: 'Gulf (UTC+04:00)', zone: 'Asia/Dubai' },
            { label: 'Afghanistan (UTC+04:30)', zone: 'Asia/Kabul' },
            { label: 'Pakistan (UTC+05:00)', zone: 'Asia/Karachi' },
            { label: 'India, Sri Lanka (UTC+05:30)', zone: 'Asia/Kolkata' },
            { label: 'Bangladesh (UTC+06:00)', zone: 'Asia/Dhaka' },
            { label: 'Thailand, Vietnam (UTC+07:00)', zone: 'Asia/Bangkok' },
            { label: 'China, Singapore (UTC+08:00)', zone: 'Asia/Shanghai' },
            { label: 'Japan, Korea (UTC+09:00)', zone: 'Asia/Tokyo' },
            { label: 'Australia Central (UTC+09:30)', zone: 'Australia/Adelaide' },
            { label: 'Australia Eastern (UTC+10:00)', zone: 'Australia/Sydney' },
            { label: 'Solomon Islands (UTC+11:00)', zone: 'Pacific/Guadalcanal' },
            { label: 'New Zealand, Fiji (UTC+12:00)', zone: 'Pacific/Auckland' }
        ];

        const funFacts = [
            'India uses a single time zone for the whole country, even though it is wide enough to span more than one.',
            'Ireland and the United Kingdom often share the same clock time, but their time zone identifiers are different.',
            'Some places use half-hour offsets, like India at UTC plus 5 hours 30 minutes.',
            'Nepal is famous for using a 45-minute offset, making it one of the most unusual standard times in the world.',
            'Australia has multiple time zones, and some regions also use half-hour offsets.',
            'Newfoundland in Canada uses UTC minus 3 hours 30 minutes, one of the best-known half-hour time zones.',
            'Time zones do not always follow straight lines because they often bend around country or state borders.',
            'China officially uses one time zone for the whole country, despite its very large east-to-west size.',
            'Daylight saving time means the same city can have different UTC offsets during the year.',
            'The International Date Line is why two nearby places can sometimes be on different calendar dates.',
            'Coordinated Universal Time, or UTC, is the reference point used for the world’s time zones.',
            'A flight can land earlier by the clock than when it took off if it crosses time zones westward.'
        ];

        function setCurrentTimeForZone(hourId, minuteId, ampmId, timeZone) {
            const now = new Date();
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: timeZone,
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            }).formatToParts(now);

            let hour = '';
            let minute = '';
            let dayPeriod = 'AM';

            parts.forEach(part => {
                if (part.type === 'hour') hour = part.value;
                if (part.type === 'minute') minute = part.value;
                if (part.type === 'dayPeriod') dayPeriod = part.value.toUpperCase();
            });

            document.getElementById(hourId).value = parseInt(hour, 10);
            document.getElementById(minuteId).value = minute;
            document.getElementById(ampmId).value = dayPeriod;
        }

        function convertSpecific(fromDateId, hourId, minuteId, ampmId, outputId, fromZone, toZone) {
            const dateStr = document.getElementById(fromDateId).value;
            const hour = document.getElementById(hourId).value;
            const minute = document.getElementById(minuteId).value;
            const ampm = document.getElementById(ampmId).value;

            if (!dateStr || hour === '' || minute === '') {
                document.getElementById(outputId).textContent = '--:--';
                return;
            }

            const utcDate = zonedDateTimeToUtc(dateStr, hour, minute, ampm, fromZone);
            document.getElementById(outputId).textContent = formatTimeOnly(utcDate, toZone);
        }

        function convertISTtoIrish() {
            convertSpecific('istDate', 'istHour', 'istMinute', 'istAmPm', 'irishDisplay', 'Asia/Kolkata', 'Europe/Dublin');
        }

        function convertIrishToIST() {
            convertSpecific('irishDate', 'irishHour', 'irishMinute', 'irishAmPm', 'istDisplay', 'Europe/Dublin', 'Asia/Kolkata');
        }

        function convertCustomTimezone() {
            const dateStr = document.getElementById('customDate').value;
            const hour = document.getElementById('customHour').value;
            const minute = document.getElementById('customMinute').value;
            const ampm = document.getElementById('customAmPm').value;
            const fromIndex = parseInt(document.getElementById('customFromTimezone').value, 10);
            const toIndex = parseInt(document.getElementById('customToTimezone').value, 10);

            if (!dateStr || hour === '' || minute === '' || isNaN(fromIndex) || isNaN(toIndex)) {
                document.getElementById('customOutput').value = '';
                return;
            }

            const fromZone = majorTimezones[fromIndex].zone;
            const toZone = majorTimezones[toIndex].zone;
            const utcDate = zonedDateTimeToUtc(dateStr, hour, minute, ampm, fromZone);

            document.getElementById('customOutput').value = formatTimeOnly(utcDate, toZone);
        }

        function refreshGenericCurrentTime() {
            const fromIndex = parseInt(document.getElementById('customFromTimezone').value, 10);
            const fromZone = majorTimezones[fromIndex].zone;
            setCurrentTimeForZone('customHour', 'customMinute', 'customAmPm', fromZone);
            convertCustomTimezone();
        }

        function populateTimezones() {
    const from = document.getElementById('customFromTimezone');
    const to = document.getElementById('customToTimezone');

    from.innerHTML = '';
    to.innerHTML = '';

    majorTimezones.forEach((tz, index) => {
        const option1 = document.createElement('option');
        option1.value = index;
        option1.textContent = tz.label;
        from.appendChild(option1);

        const option2 = document.createElement('option');
        option2.value = index;
        option2.textContent = tz.label;
        to.appendChild(option2);
    });

    from.value = 7;
    to.value = 3;
    setTodayDates();
    loadCurrentTimes();
    loadFunFact();
}

        function setTodayDates() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const todayStr = `${yyyy}-${mm}-${dd}`;

            document.getElementById('istDate').value = todayStr;
            document.getElementById('irishDate').value = todayStr;
            document.getElementById('customDate').value = todayStr;
        }

        function loadCurrentTimes() {
            setCurrentTimeForZone('istHour', 'istMinute', 'istAmPm', 'Asia/Kolkata');
            setCurrentTimeForZone('irishHour', 'irishMinute', 'irishAmPm', 'Europe/Dublin');

            const fromIndex = parseInt(document.getElementById('customFromTimezone').value, 10);
            const fromZone = majorTimezones[fromIndex].zone;
            setCurrentTimeForZone('customHour', 'customMinute', 'customAmPm', fromZone);

            convertISTtoIrish();
            convertIrishToIST();
            convertCustomTimezone();
        }

        function loadFunFact() {
            const factBox = document.getElementById('funFactText');
            const randomIndex = Math.floor(Math.random() * funFacts.length);
            factBox.textContent = funFacts[randomIndex];
        }

        function clearAll() {
            document.getElementById('istDate').value = '';
            document.getElementById('istHour').value = '';
            document.getElementById('istMinute').value = '';
            document.getElementById('istAmPm').value = 'AM';

            document.getElementById('irishDate').value = '';
            document.getElementById('irishHour').value = '';
            document.getElementById('irishMinute').value = '';
            document.getElementById('irishAmPm').value = 'AM';

            document.getElementById('customDate').value = '';
            document.getElementById('customHour').value = '';
            document.getElementById('customMinute').value = '';
            document.getElementById('customAmPm').value = 'AM';

            document.getElementById('irishDisplay').textContent = '--:--';
            document.getElementById('istDisplay').textContent = '--:--';
            document.getElementById('customOutput').value = '';
        }

        window.onload = populateTimezones;
    </script>
</head>
<body>
    <div class="converter">
        <div class="top-sections">
            <div class="panel">
                <h3>Indian to Irish</h3>
                <div class="controls" style="margin-bottom: 12px;">
                    <input id="istDate" type="date" onchange="convertISTtoIrish()">
                </div>
                <div class="panel-row">
                    <div class="controls">
                        <input id="istHour" type="number" placeholder="HH" onfocus="clearOnFocus(this)" onblur="convertISTtoIrish()" onkeydown="if(event.key==='Enter') convertISTtoIrish()">
                        <span>:</span>
                        <input id="istMinute" type="number" placeholder="MM" onfocus="clearOnFocus(this)" onblur="convertISTtoIrish()" onkeydown="if(event.key==='Enter') convertISTtoIrish()">
                        <select id="istAmPm" onchange="convertISTtoIrish()">
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                    </div>
                    <div class="digital-display" id="irishDisplay">--:--</div>
                </div>
            </div>

            <div class="panel">
                <h3>Irish to Indian</h3>
                <div class="controls" style="margin-bottom: 12px;">
                    <input id="irishDate" type="date" onchange="convertIrishToIST()">
                </div>
                <div class="panel-row">
                    <div class="controls">
                        <input id="irishHour" type="number" placeholder="HH" onfocus="clearOnFocus(this)" onblur="convertIrishToIST()" onkeydown="if(event.key==='Enter') convertIrishToIST()">
                        <span>:</span>
                        <input id="irishMinute" type="number" placeholder="MM" onfocus="clearOnFocus(this)" onblur="convertIrishToIST()" onkeydown="if(event.key==='Enter') convertIrishToIST()">
                        <select id="irishAmPm" onchange="convertIrishToIST()">
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                    </div>
                    <div class="digital-display" id="istDisplay">--:--</div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="bottom-section">
            <h3>Generic Converter</h3>

            <div class="generic-date-row">
                <input id="customDate" type="date" onchange="convertCustomTimezone()">
            </div>

            <div class="generic-row">
                <div class="generic-block">
                    <div class="tz-select-row">
                        <select id="customFromTimezone" onchange="refreshGenericCurrentTime()"></select>
                    </div>

                    <div class="controls">
                        <input id="customHour" type="number" placeholder="HH" onfocus="clearOnFocus(this)" onblur="convertCustomTimezone()" onkeydown="if(event.key==='Enter') convertCustomTimezone()">
                        <span>:</span>
                        <input id="customMinute" type="number" placeholder="MM" onfocus="clearOnFocus(this)" onblur="convertCustomTimezone()" onkeydown="if(event.key==='Enter') convertCustomTimezone()">
                        <select id="customAmPm" onchange="convertCustomTimezone()">
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                    </div>
                </div>

                <div class="generic-block">
                    <div class="tz-select-row">
                        <select id="customToTimezone" onchange="convertCustomTimezone()"></select>
                    </div>

                    <input id="customOutput" class="output-box" type="text" readonly>
                </div>
            </div>
        </div>

        <button onclick="clearAll()">Clear All</button>

<!--         <div class="fun-line" id="funFactText"></div> -->
    </div>
</body>
</html>
